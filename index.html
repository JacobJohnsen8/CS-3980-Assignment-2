<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US Population</title>
  
  <style>

body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 40px;
    display: flex;
    justify-content: center;
}

/* Card container */
.container {
    background: white;
    padding: 30px 40px;
    border-radius: 10px;
    box-shadow: 0px 4px 15px rgba(0,0,0,0.15);
    text-align: center;
}

/* Title */
h1 {
    margin-bottom: 20px;
    color: #2c3e50;
}

/* Table */
table {
    border-collapse: collapse;
    width: 300px;
    margin: auto;
}

/* Table header */
th {
    background: #2c3e50;
    color: white;
    padding: 10px;
}

/* Table cells */
td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

/* Hover effect */
tr:hover {
    background-color: #f1f1f1;
}

/* Status text */
#status {
    margin-top: 15px;
    font-size: 14px;
    color: gray;
}

</style>
</head>
<body>

<div class="container">

<h1>US Population</h1>

<table>
    <thead>
        <tr>
            <th>Year</th>
            <th>Population</th>
        </tr>
    </thead>

    <tbody id="population-body"></tbody>

</table>

<div id="status"></div>
<footer>
Data Source: 
<a href="https://datausa.io/" target="_blank">DataUSA API</a>
</footer>

<p class="author">Created by Jacob Johnsen</p>

</div>


  <script>
    (function () {
      "use strict";

      const API_URL =
        "https://api.datausa.io/tesseract/data.jsonrecords?cube=acs_yg_total_population_5&measures=Population&drilldowns=Year";

      const tbody = document.getElementById("population-body");
      const statusEl = document.getElementById("status");

      function setStatus(msg) {
        statusEl.textContent = msg;
      }

      function formatNumber(n) {
        // Adds commas automatically (e.g., 311,536,594)
        return Number(n).toLocaleString("en-US");
      }

      function addRow(year, population) {
        const tr = document.createElement("tr");

        const tdYear = document.createElement("td");
        tdYear.textContent = year;

        const tdPop = document.createElement("td");
        tdPop.textContent = formatNumber(population);

        tr.appendChild(tdYear);
        tr.appendChild(tdPop);
        tbody.appendChild(tr);
      }

      async function loadPopulation() {
        try {
          setStatus("Loading data...");

          const response = await fetch(API_URL);
          if (!response.ok) {
            throw new Error(`HTTP error ${response.status}`);
          }

          const json = await response.json();

          // DataUSA returns rows in json.data
          const rows = Array.isArray(json.data) ? json.data : [];

          // Clear any existing rows
          tbody.innerHTML = "";

          // Sort by Year ascending
          rows.sort((a, b) => Number(a.Year) - Number(b.Year));

          // Build table rows
          for (const row of rows) {
            // row.Year and row.Population are expected keys
            addRow(row.Year, row.Population);
          }

          setStatus(`Loaded ${rows.length} rows.`);
        } catch (err) {
          console.error(err);
          setStatus("Error loading data. Check the console for details.");
        }
      }

      // Run when page loads
      loadPopulation();
    })();
  </script>

</body>
</html>
